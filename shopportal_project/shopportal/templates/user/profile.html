{% extends 'base.html' %}
{% block title %}My Profile - ShopPortal{% endblock %}
{% block content %}
<div class="container py-5">
  <h3 class="fw-bold mb-4"><i class="fas fa-user-circle me-2 text-warning"></i>My Profile</h3>
  <div class="row g-4">
    <div class="col-lg-4">
      <div class="card border-0 shadow-sm text-center p-4" style="border-radius:16px;">
        <div class="mb-3"><div class="rounded-circle bg-warning d-inline-flex align-items-center justify-content-center" style="width:80px;height:80px;font-size:2rem;color:#1a1a2e;"><i class="fas fa-user"></i></div></div>
        <h5 class="fw-bold">{{ user.full_name or user.username }}</h5>
        <p class="text-muted">{{ user.email }}</p>
        <div class="d-grid gap-2 mt-3">
          <a href="{{ url_for('user.orders') }}" class="btn btn-outline-primary btn-sm"><i class="fas fa-box me-2"></i>My Orders</a>
          <a href="{{ url_for('user.wishlist') }}" class="btn btn-outline-danger btn-sm"><i class="fas fa-heart me-2"></i>Wishlist</a>
          <a href="{{ url_for('auth.logout') }}" class="btn btn-outline-secondary btn-sm"><i class="fas fa-sign-out-alt me-2"></i>Logout</a>
        </div>
      </div>
    </div>
    <div class="col-lg-8">
      <div class="card border-0 shadow-sm p-4" style="border-radius:16px;">
        <h5 class="fw-bold mb-4">Edit Profile</h5>
        <form method="POST">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label fw-semibold">Full Name</label>
              <input type="text" name="full_name" class="form-control" value="{{ user.full_name or '' }}">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Phone</label>
              <input type="tel" name="phone" class="form-control" value="{{ user.phone or '' }}">
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold">Address</label>
              <textarea name="address" class="form-control" rows="2">{{ user.address or '' }}</textarea>
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">City</label>
              <input type="text" name="city" class="form-control" value="{{ user.city or '' }}">
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">State</label>
              <input type="text" name="state" class="form-control" value="{{ user.state or '' }}">
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Pincode</label>
              <input type="text" name="pincode" class="form-control" value="{{ user.pincode or '' }}">
            </div>
          </div>
          <button type="submit" class="btn btn-primary-custom mt-4 px-4"><i class="fas fa-save me-2"></i>Save Changes</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
