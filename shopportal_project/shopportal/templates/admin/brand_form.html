{% extends 'admin/base_admin.html' %}
{% block page_title %}{{ 'Edit' if brand else 'Add' }} Brand{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="form-card">
      <h5 class="fw-bold mb-4">{{ 'Edit' if brand else 'Add New' }} Brand</h5>
      <form method="POST" enctype="multipart/form-data">
        <div class="mb-3">
          <label class="form-label">Brand Name *</label>
          <input type="text" name="name" class="form-control" value="{{ brand.name if brand else '' }}" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Description</label>
          <textarea name="description" class="form-control" rows="3">{{ brand.description if brand else '' }}</textarea>
        </div>
        <div class="mb-4">
          <label class="form-label">Logo Image</label>
          <input type="file" name="logo" class="form-control" accept="image/*">
        </div>
        <div class="d-flex gap-3">
          <button type="submit" class="btn btn-save px-4">{{ 'Update' if brand else 'Add' }} Brand</button>
          <a href="{{ url_for('admin.brands') }}" class="btn btn-outline-secondary px-4">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
