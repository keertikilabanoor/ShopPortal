{% extends 'admin/base_admin.html' %}
{% block page_title %}Add Subcategory{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-lg-6"><div class="form-card">
  <h5 class="fw-bold mb-4">Add Subcategory</h5>
  <form method="POST">
    <div class="mb-3"><label class="form-label">Category *</label>
      <select name="category_id" class="form-select" required>
        <option value="">-- Select Category --</option>
        {% for c in categories %}<option value="{{ c.id }}">{{ c.name }}</option>{% endfor %}
      </select></div>
    <div class="mb-4"><label class="form-label">Subcategory Name *</label>
      <input type="text" name="name" class="form-control" required></div>
    <div class="d-flex gap-3">
      <button type="submit" class="btn btn-save px-4">Add Subcategory</button>
      <a href="{{ url_for('admin.subcategories') }}" class="btn btn-outline-secondary px-4">Cancel</a>
    </div>
  </form>
</div></div></div>
{% endblock %}
