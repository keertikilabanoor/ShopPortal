{% extends 'base.html' %}
{% block title %}Register - ShopPortal{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="auth-card card p-4">
        <div class="text-center mb-4">
          <i class="fas fa-user-plus fa-3x text-warning mb-2"></i>
          <h3 class="fw-bold">Create Account</h3>
        </div>
        <form method="POST">
          <div class="row">
            <div class="col-md-6 mb-3"><label class="form-label fw-semibold">Username</label>
              <input type="text" name="username" class="form-control" required></div>
            <div class="col-md-6 mb-3"><label class="form-label fw-semibold">Full Name</label>
              <input type="text" name="full_name" class="form-control" required></div>
          </div>
          <div class="mb-3"><label class="form-label fw-semibold">Email</label>
            <input type="email" name="email" class="form-control" required></div>
          <div class="mb-3"><label class="form-label fw-semibold">Phone</label>
            <input type="tel" name="phone" class="form-control"></div>
          <div class="mb-3"><label class="form-label fw-semibold">Password</label>
            <input type="password" name="password" class="form-control" minlength="6" required></div>
          <button type="submit" class="btn btn-primary-custom w-100 py-2">Create Account</button>
        </form>
        <div class="text-center mt-3">
          <small class="text-muted">Already have an account? <a href="{{ url_for('auth.login') }}" class="text-decoration-none fw-bold">Login</a></small>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
