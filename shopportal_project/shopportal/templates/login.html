{% extends 'base.html' %}
{% block title %}Login - ShopPortal{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="auth-card card p-4">
        <div class="text-center mb-4">
          <i class="fas fa-shopping-bag fa-3x text-warning mb-2"></i>
          <h3 class="fw-bold">Welcome Back</h3>
          <p class="text-muted">Login to your account</p>
        </div>
        <form method="POST">
          <div class="mb-3"><label class="form-label fw-semibold">Email</label>
            <input type="email" name="email" class="form-control" placeholder="Enter your email" required></div>
          <div class="mb-3"><label class="form-label fw-semibold">Password</label>
            <input type="password" name="password" class="form-control" placeholder="Enter password" required></div>
          <button type="submit" class="btn btn-primary-custom w-100 py-2">Login</button>
        </form>
        <div class="text-center mt-3">
          <small class="text-muted">Don't have an account? <a href="{{ url_for('auth.register') }}" class="text-decoration-none fw-bold">Register</a></small>
        </div>
        <hr><div class="text-center text-muted small">
          <strong>Admin:</strong> admin@shop.com / admin123
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
